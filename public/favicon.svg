<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d70;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#faviconGrad)"/>
  
  <!-- Inner white circle -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  
  <!-- SC monogram -->
  <text x="32" y="40" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">
    SC
  </text>
  
  <!-- Accent line -->
  <line x1="12" y1="48" x2="52" y2="48" stroke="#ff6b35" stroke-width="2" opacity="0.8"/>
</svg>