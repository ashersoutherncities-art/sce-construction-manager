<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="appleTouchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d70;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#appleTouchGrad)"/>
  
  <!-- Inner border -->
  <rect x="4" y="4" width="172" height="172" rx="36" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  
  <!-- SC monogram -->
  <text x="90" y="110" font-family="Georgia, serif" font-size="70" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">
    SC
  </text>
  
  <!-- Accent line -->
  <line x1="30" y1="135" x2="150" y2="135" stroke="#ff6b35" stroke-width="3" opacity="0.9"/>
</svg>